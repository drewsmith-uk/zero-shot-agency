site_name: Zero-Shot Agency
site_url: https://zeroshotagency.com
site_description: The Definitive Generative Engine Optimization (GEO) & AI Search Consultancy.

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - roamlinks
  - blog:
      blog_dir: blog
      post_dir: blog/posts
  - social

hooks:
  - tools/blog_hook.py
  - tools/build_log.py

extra_css:
  - stylesheets/zsa-theme.css?v=11

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - md_in_html
  - def_list
  - attr_list
  - meta
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist: 
      custom_checkbox: true

nav:
  - Home: index.md
#  - Leaderboard: leaderboard.md
  - Strategy & Playbook: strategy.md
  - Blog:
    - blog/index.md
  - Concepts:
    - Overview: concepts/index.md
    - Citation Mechanics: concepts/citation-mechanics.md
    - Semantic Structure: concepts/geo-semantic-structure.md
    - Format Optimization: concepts/llm-format-optimization.md
    - GEO Tactics: concepts/geo-tactics.md
    - Agentic Onboarding: concepts/agentic-onboarding.md
    - Subagent-Driven Development SOP: concepts/subagent-driven-development-sop.md
    - LLMs.txt Template: concepts/llms-txt-template.md
    - Sanity Skills Eval: concepts/sanity-skills-evaluation.md
    - Ranking Factors: concepts/ranking-factors.md
    - RAG Architecture: concepts/rag-architecture.md
    - Backlink Reconnaissance: concepts/backlink-reconnaissance.md
  - Entities:
    - Overview: entities/index.md
    - Princeton Paper: entities/princeton-geo-paper.md
    - Cursorrules Gen: entities/cursorrules-generator.md
    - Universal GEO Context Gen: entities/geo-context-generator.md
    - GEO Tracker: entities/geo-tracker.md
    - Publisher Pipeline: entities/publisher-pipeline.md
  - Tools:
    - Overview: tools/index.md
  - Contact: contact.md