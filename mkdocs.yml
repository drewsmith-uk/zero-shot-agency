site_name: Zero-Shot Agency
site_url: https://zeroshotagency.com
site_description: The Definitive Generative Engine Optimization (GEO) & AI Search Consultancy.

theme:
  name: material
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
  - awesome-pages
    - search.highlight
  - awesome-pages
    - content.code.copy

plugins:
  - search
  - awesome-pages
  - roamlinks
  - blog:
      blog_dir: blog
      post_dir: blog/posts
  - social

hooks:
  - docs/tools/blog_hook.py

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - md_in_html
  - def_list
  - attr_list
  - meta

